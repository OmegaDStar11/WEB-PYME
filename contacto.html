<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Omega D Star</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">Omega D Star</div>
            <nav>
                <a href="index.html">Inicio</a>
                <a href="nosotros.html">Nosotros</a>
                <a href="contacto.html" class="active">Contacto</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Contáctanos</h2>
            <p>Envíanos un mensaje para iniciar tu próximo proyecto de software.</p>
            
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
                </div>
                <div class="form-group">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" name="correo" required placeholder="correo@ejemplo.com">
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Escribe aquí tu mensaje..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Enviar Datos</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Omega D Star Enterprise. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
